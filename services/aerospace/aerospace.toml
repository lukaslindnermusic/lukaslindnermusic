####################################
########  AEROSPACE CONFIG  ########
########  LUKAS LINDNER     ########
####################################


#######  RESOURCES  #######
# Guide: https://nikitabobko.github.io/AeroSpace/guide
# Commands: https://nikitabobko.github.io/AeroSpace/commands
# Goodies: https://nikitabobko.github.io/AeroSpace/goodies






#######  STARTUP, SETUP & LAYOUT  #######

# After Login
after-login-command = []

# After Startup
after-startup-command = [
    'exec-and-forget /usr/local/bin/sketchybar --reload',
    'exec-and-forget /usr/local/bin/borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=7.0'
]

# Start AeroSpace at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Tiles & Accordion
default-root-container-layout = 'tiles'
accordion-padding = 30
default-root-container-orientation = 'auto'

# Mouse follows focus when focused window changes
on-focus-changed = ['move-mouse window-lazy-center']

# Notify Sketchybar about workspace change
exec-on-workspace-change = ['/bin/bash', '-c', '/usr/local/bin/sketchybar --trigger aerospace_update']

automatically-unhide-macos-hidden-apps = false

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 16
    inner.vertical =   16
    outer.left =       16
    outer.bottom =     16
    outer.top =        50 # sketchybar
    outer.right =      16







#######  ASSIGNMENTS  #######

# Workspace to Monitor
[workspace-to-monitor-force-assignment]
    1 = 'main'
    2 = 'main'
    3 = 'main'
    4 = 'main'
    5 = 'main'
    6 = 'DELL'
    7 = 'DELL'
    8 = 'DELL'
    9 = 'DELL'  
    10 = 'DELL'

# App-specific assignments
# See: https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback
# And also: https://nikitabobko.github.io/AeroSpace/goodies#popular-apps-ids

# Mail
[[on-window-detected]]
    if.app-id = 'com.apple.mail'
    run = 'move-node-to-workspace 6'

# WhatsApp
[[on-window-detected]]
    if.app-id = 'net.whatsapp.WhatsApp'
    run = 'move-node-to-workspace 6'

# Calendar
[[on-window-detected]]
    if.app-id = 'com.apple.iCal'
    run = 'move-node-to-workspace 7'

# Finamp
[[on-window-detected]]
    if.app-id = 'com.lukaslindner.finamp-macos-debug'
    run = 'move-node-to-workspace 8'

# iOS Simulator
[[on-window-detected]]
    if.app-id = 'com.apple.iphonesimulator'
    run = 'layout floating'

# Logic Pro – Main
[[on-window-detected]]
    if.app-id = 'com.apple.logic10'
    if.window-title-regex-substring = ' - Tracks$'
    run = 'move-node-to-workspace 5'
# Logic Pro – Mixer
[[on-window-detected]]
    if.app-id = 'com.apple.logic10'
    if.window-title-regex-substring = ' - Mixer: (Tracks|All|Single)$'
    run = 'move-node-to-workspace 10'
# Logic Pro – Video
[[on-window-detected]]
    if.app-id = 'com.apple.logic10'
    if.window-title-regex-substring = '\.(mp4|mov|m4v|avi|mkv)$'
    run = 'move-node-to-workspace 10'







#######  KEYBOARD SHORTCUTS  #######

# Custom Karabiner Elements Mappings (Nav Layer):
# - caps (hold)     -> alt-ctrl                 (Main Activator)
# - caps (tap)      -> escape
# - s / u           -> + shift                  (while caps held)
# - d / h           -> + cmd                    (while caps held)
# - j, i, k, l      -> left, up, down, right    (while caps held)
# - r               -> Resize Activator         (while caps held)
# - e               -> + shift                  (while caps+r held)
# - j, i, k, l      -> f16, f18, f19, f17       (while caps+r held)               
# - u               -> f20                      (while caps+r held)       

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
#                   sectionSign (ISO keyboards only, european keyboards only)
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift




########  MAIN MODE  ########
# Shortcuts for window management
[mode.main.binding]

    ########  BINDING MODES  ########

    # LAUNCH MODE
    # -> caps + s + space               (Note: caps + space triggers Alfred)
	alt-ctrl-shift-space = ['mode launch', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=launch']



    ########  NODES  ########

    # FOCUS
    # -> caps + [j,i,k,l]               (or caps + arrows)
    alt-ctrl-left = 'focus left --boundaries all-monitors-outer-frame'
    alt-ctrl-down = 'focus down --boundaries all-monitors-outer-frame'
    alt-ctrl-up = 'focus up --boundaries all-monitors-outer-frame'
    alt-ctrl-right = 'focus right --boundaries all-monitors-outer-frame'

    # MOVE
    # -> caps + s + [j,i,k,l]           (or caps + s + arrows)
    alt-ctrl-shift-left = 'move left --boundaries all-monitors-outer-frame'
    alt-ctrl-shift-down = 'move down --boundaries all-monitors-outer-frame'
    alt-ctrl-shift-up = 'move up --boundaries all-monitors-outer-frame'
    alt-ctrl-shift-right = 'move right --boundaries all-monitors-outer-frame'

    # JOIN WITH
    # -> caps + s + d + [j,i,k,l]       (or caps + s + d + arrows)
    alt-ctrl-shift-cmd-left = 'join-with left'
    alt-ctrl-shift-cmd-down = 'join-with down'
    alt-ctrl-shift-cmd-up = 'join-with up'
    alt-ctrl-shift-cmd-right = 'join-with right'

    # RESIZE
    # Standard Resize           -> caps + r + [j,i,k,l] 
    # Extreme Resize            -> caps + r + e + [j,i,k,l]
    # Balancing Sizes           -> caps + r + u
    # Flatten Workspace Tree    -> caps + r + e + u
    alt-ctrl-f16 = 'resize width -50'
    alt-ctrl-f17 = 'resize width +50'
    alt-ctrl-f18 = 'resize height -50'
    alt-ctrl-f19 = 'resize height +50'
    alt-ctrl-shift-f16 = 'resize width -200'
    alt-ctrl-shift-f17 = 'resize width +200'
    alt-ctrl-shift-f18 = 'resize height -200'
    alt-ctrl-shift-f19 = 'resize height +200'
    alt-ctrl-f20 = 'balance-sizes'
    alt-ctrl-shift-f20 = 'flatten-workspace-tree'
    
    # LAYOUT
    # Toggle Fullscreen         -> caps + f
    # Toggle Floating Layout    -> caps + s + f
    alt-ctrl-f = 'fullscreen'
    alt-ctrl-shift-f = 'layout floating tiling'



    ########  WORKSPACES  ########

    # CYCLING / TOGGLING
    # Prev (current monitor)    -> caps + w
    # Next (current monitor)    -> caps + e
    # Back and forth            -> caps + tab
    alt-ctrl-w = 'workspace --wrap-around prev'
    alt-ctrl-e = 'workspace --wrap-around next'
    alt-ctrl-tab = 'workspace-back-and-forth'

    # FOCUS / SHOW
    # -> caps + [1-0]
    alt-ctrl-1 = 'workspace 1'
    alt-ctrl-2 = 'workspace 2'
    alt-ctrl-3 = 'workspace 3'
    alt-ctrl-4 = 'workspace 4'
    alt-ctrl-5 = 'workspace 5'
    alt-ctrl-6 = 'workspace 6'
    alt-ctrl-7 = 'workspace 7'
    alt-ctrl-8 = 'workspace 8'
    alt-ctrl-9 = 'workspace 9'
	alt-ctrl-0 = 'workspace 10'

    # MOVE NODE TO WORKSPACE AND FOCUS
    # -> caps + u + [1-5]
    # -> caps + s + [6-0]
    alt-ctrl-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
    alt-ctrl-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
    alt-ctrl-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
    alt-ctrl-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
    alt-ctrl-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
    alt-ctrl-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
    alt-ctrl-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
    alt-ctrl-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
    alt-ctrl-shift-9 = ['move-node-to-workspace 9', 'workspace 9']
	alt-ctrl-shift-0 = ['move-node-to-workspace 10', 'workspace 10']

    # MOVE NODE TO WORKSPACE BUT STAY
    # -> caps + u + h + [1-5]
    # -> caps + s + d + [6-0]
	alt-ctrl-shift-cmd-1 = 'move-node-to-workspace 1'
	alt-ctrl-shift-cmd-2 = 'move-node-to-workspace 2'
	alt-ctrl-shift-cmd-3 = 'move-node-to-workspace 3'
	alt-ctrl-shift-cmd-4 = 'move-node-to-workspace 4'
	alt-ctrl-shift-cmd-5 = 'move-node-to-workspace 5'
	alt-ctrl-shift-cmd-6 = 'move-node-to-workspace 6'
	alt-ctrl-shift-cmd-7 = 'move-node-to-workspace 7'
	alt-ctrl-shift-cmd-8 = 'move-node-to-workspace 8'
	alt-ctrl-shift-cmd-9 = 'move-node-to-workspace 9'
    alt-ctrl-shift-cmd-0 = 'move-node-to-workspace 10'




########  LAUNCH MODE  ########
# Shortcuts to launch apps or run scripts
[mode.launch.binding]

    # BACK TO MAIN
    # -> caps
	esc = ['mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main']

    # AEROSPACE CONFIG
    comma = ['exec-and-forget open /path/to/.aerospace.toml', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Open Config
    period = ['reload-config', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Reload Config

    # APPLICATIONS
	t = ['exec-and-forget osascript /path/to/aerospace/open_new_window/ghostty_terminal.scpt', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Terminal
	f = ['exec-and-forget osascript /path/to/aerospace/open_new_window/finder.scpt', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Finder
    b = ['exec-and-forget osascript /path/to/aerospace/open_new_window/brave.scpt', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Brave
    w = ['exec-and-forget osascript /path/to/aerospace/open_new_window/librewolf.scpt', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # LibreWolf
    c = ['exec-and-forget open /Applications/WhatsApp.app', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # WhatsApp
    l = ['exec-and-forget open "/Applications/Logic Pro X.app"', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Logic
    d = ['exec-and-forget open "/Applications/Dorico 6.app"', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Dorico
    m = ['exec-and-forget osascript /path/to/aerospace/open_new_window/mail.scpt', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Mail
    k = ['exec-and-forget osascript /path/to/aerospace/open_new_window/calendar.scpt', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Calendar
    e = ['exec-and-forget open "/Applications/Visual Studio Code.app"', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # VS Code
    v = ['exec-and-forget open "/Applications/Bitwarden.app"', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Bitwarden
    a = ['exec-and-forget open "/Applications/Yubico Authenticator.app"', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # Yubico Authenticator

    # SCRIPTS
    s = ['exec-and-forget osascript /path/to/aerospace/open_new_window/ssh_sessions_ghostty.scpt', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --trigger aerospace_update AEROSPACE_MODE=main'] # SSH Sessions
